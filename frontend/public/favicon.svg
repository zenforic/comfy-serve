<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Cyan gradient for the light side, giving a 3D bevel/sphere effect -->
    <radialGradient id="cyanGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e0ffff" />
      <stop offset="40%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#009999" />
    </radialGradient>
    
    <!-- Black gradient for the dark side -->
    <radialGradient id="blackGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#444444" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Drop shadow for the outer edge -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.6"/>
    </filter>
    
    <!-- Inner shadow effect for the text to give it depth -->
    <filter id="text-shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Raised bevel gradient for the outer border -->
    <linearGradient id="borderBevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="20%" stop-color="#00ffff" />
      <stop offset="80%" stop-color="#008888" />
      <stop offset="100%" stop-color="#003333" />
    </linearGradient>
  </defs>

  <!-- Cyan background circle (Right side) -->
  <circle cx="50" cy="50" r="48" fill="url(#cyanGrad)" filter="url(#shadow)" />
  
  <!-- Black S-curve shape (Left side) -->
  <path d="M 50 2 
           A 48 48 0 0 0 50 98 
           A 24 24 0 0 0 50 50 
           A 24 24 0 0 1 50 2 Z" 
        fill="url(#blackGrad)" />
  
  <!-- '1' on the bottom left (black) side. -->
  <text x="38" y="74" 
        font-family="Arial, sans-serif" 
        font-size="40" 
        font-weight="900" 
        fill="#00ffff" 
        text-anchor="middle" 
        alignment-baseline="central"
        filter="url(#text-shadow)">1</text>
  
  <!-- '0' on the top right (cyan) side. -->
  <text x="62" y="26" 
        font-family="Arial, sans-serif" 
        font-size="40" 
        font-weight="900" 
        fill="#000000" 
        text-anchor="middle" 
        alignment-baseline="central"
        filter="url(#text-shadow)">0</text>
  
  <!-- Thick outer bevel rim to make it noticeably raised -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#borderBevel)" stroke-width="4" />
</svg>